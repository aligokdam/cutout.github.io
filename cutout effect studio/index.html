<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- Security headers (CSP, Referrer-Policy, Permissions-Policy). Some directives
     (frame-ancestors) require a real HTTP response header to fully apply. -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: blob:;
  connect-src 'self';
  font-src 'self';
  object-src 'none';
  base-uri 'self';
  form-action 'none';
  frame-ancestors 'none';
  upgrade-insecure-requests;
">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0b0c0f">

<title>Cutout Effect Studio</title>

<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root{
    --bg-0:#0a0b0d;
    --bg-1:#111318;
    --panel:rgba(255,255,255,0.045);
    --panel-border:rgba(255,255,255,0.09);
    --panel-border-strong:rgba(255,255,255,0.16);
    --text:#f2f3f5;
    --muted:#98a1ac;
    --muted-2:#6b7280;
    --accent:#5eb1ff;
    --accent-2:#a78bfa;
    --accent-3:#ff9f5e;
    --danger:#ff6b6b;
    --success:#5ee6a8;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --shadow-md:0 10px 30px rgba(0,0,0,0.35);
    --ease:cubic-bezier(.16,1,.3,1);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:var(--text);
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(94,177,255,0.16), transparent 45%),
      radial-gradient(circle at 85% 10%, rgba(167,139,250,0.14), transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(255,159,94,0.08), transparent 50%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    background-attachment:fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 16px 48px;
    -webkit-font-smoothing:antialiased;
  }

  @media (prefers-reduced-motion:no-preference){
    .fade-in{ animation: fadeIn .6s var(--ease) both; }
    .fade-in.d1{ animation-delay:.05s; }
    .fade-in.d2{ animation-delay:.12s; }
    .fade-in.d3{ animation-delay:.19s; }
  }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* Focus visibility — accessible, high contrast, never removed */
  :focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
    border-radius:6px;
  }

  /* ============================================================
     HERO / HEADER — glassmorphism, Apple/Vercel-inspired
     ============================================================ */
  header.hero{
    width:100%;
    max-width:1040px;
    padding:56px 16px 28px;
    text-align:center;
  }
  h1.title{
    font-size:clamp(2.1rem, 5vw, 3.4rem);
    font-weight:700;
    letter-spacing:-0.03em;
    margin:0 0 14px;
    line-height:1.08;
    background:linear-gradient(135deg, #ffffff 20%, var(--accent) 60%, var(--accent-2) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  p.subtitle{
    color:var(--muted);
    margin:0 auto;
    max-width:560px;
    font-size:clamp(0.95rem, 1.6vw, 1.08rem);
    line-height:1.55;
  }

  /* ============================================================
     LAYOUT
     ============================================================ */
  .app{
    width:100%;
    max-width:1040px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-lg);
    padding:24px;
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:var(--shadow-md);
    transition:border-color .3s var(--ease), box-shadow .3s var(--ease);
  }
  .panel:hover{
    border-color:var(--panel-border-strong);
  }

  /* ---- Upload area ---- */
  .upload-area{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    border:1.5px dashed var(--panel-border-strong);
    border-radius:var(--radius-md);
    padding:44px 24px;
    text-align:center;
    cursor:pointer;
    color:var(--muted);
    transition:border-color .25s var(--ease), background .25s var(--ease), transform .2s var(--ease);
    outline-offset:4px;
    position:relative;
  }
  .upload-area:hover,
  .upload-area:focus-visible{
    border-color:var(--accent);
    background:rgba(94,177,255,0.06);
    transform:translateY(-1px);
  }
  .upload-area.dragging{
    border-color:var(--accent-2);
    background:rgba(167,139,250,0.09);
  }
  .upload-area input[type="file"]{
    position:absolute;
    width:1px;height:1px;
    opacity:0;
    pointer-events:none;
  }
  .upload-area .icon{
    font-size:2.1rem;
    line-height:1;
  }
  .upload-area .primary-text{
    color:var(--text);
    font-weight:600;
    font-size:1rem;
  }
  .upload-area .hint{
    font-size:0.8rem;
    color:var(--muted-2);
  }

  /* ---- Controls ---- */
  .controls-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:24px 20px;
  }
  .controls-actions{
    display:flex;
    gap:12px;
    justify-content:flex-end;
    margin-top:22px;
    padding-top:18px;
    border-top:1px solid var(--panel-border);
    flex-wrap:wrap;
  }
  .slider-group{
    flex:1;
    min-width:240px;
  }
  .slider-group label{
    display:flex;
    justify-content:space-between;
    font-size:0.88rem;
    color:var(--muted);
    margin-bottom:10px;
    font-weight:500;
  }
  .slider-group label .value{
    color:var(--accent);
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  input[type="range"]{
    width:100%;
    height:6px;
    -webkit-appearance:none;
    appearance:none;
    background:linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius:3px;
    outline-offset:6px;
    cursor:pointer;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:20px;height:20px;
    border-radius:50%;
    background:#fff;
    cursor:pointer;
    box-shadow:0 0 0 5px rgba(94,177,255,0.25), var(--shadow-md);
    transition:box-shadow .2s var(--ease), transform .2s var(--ease);
  }
  input[type="range"]:hover::-webkit-slider-thumb{
    transform:scale(1.08);
  }
  input[type="range"]::-moz-range-thumb{
    width:20px;height:20px;
    border-radius:50%;
    background:#fff;
    cursor:pointer;
    border:none;
    box-shadow:0 0 0 5px rgba(94,177,255,0.25), var(--shadow-md);
  }
  input[type="range"]::-moz-range-track{
    background:linear-gradient(90deg, var(--accent), var(--accent-2));
    height:6px;
    border-radius:3px;
  }

  /* ---- Buttons ---- */
  button{
    font-family:inherit;
    border:none;
    padding:11px 22px;
    border-radius:var(--radius-sm);
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
    transition:transform .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease), opacity .18s var(--ease);
    white-space:nowrap;
  }
  button:active:not(:disabled){ transform:translateY(1px) scale(0.98); }

  button.primary{
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#0b0c0e;
    box-shadow:0 6px 20px rgba(94,177,255,0.25);
  }
  button.primary:hover:not(:disabled){
    box-shadow:0 8px 26px rgba(94,177,255,0.4);
    transform:translateY(-1px);
  }
  button.secondary{
    background:transparent;
    color:var(--accent-3);
    border:1px solid rgba(255,159,94,0.5);
  }
  button.secondary:hover:not(:disabled){
    background:rgba(255,159,94,0.1);
    transform:translateY(-1px);
  }
  button:disabled{
    background:rgba(255,255,255,0.06);
    color:var(--muted-2);
    cursor:not-allowed;
    box-shadow:none;
    transform:none;
    opacity:0.6;
  }

  /* ---- Canvas / preview ---- */
  .canvas-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03), transparent 60%), #0a0b0d;
    border:1px solid var(--panel-border);
    border-radius:var(--radius-md);
    padding:16px;
    overflow:auto;
    min-height:220px;
    transition:border-color .3s var(--ease);
  }
  canvas{
    max-width:100%;
    height:auto;
    border-radius:8px;
    display:block;
    box-shadow:var(--shadow-md);
  }
  .placeholder{
    color:var(--muted-2);
    font-size:0.9rem;
    text-align:center;
  }

  .actions{
    display:flex;
    gap:12px;
    justify-content:flex-end;
    margin-top:18px;
    flex-wrap:wrap;
  }

  /* ---- Status / error live region ---- */
  #statusMessage{
    min-height:1.2em;
    font-size:0.85rem;
    margin-top:10px;
    text-align:center;
    transition:color .2s var(--ease);
  }
  #statusMessage[data-tone="error"]{ color:var(--danger); }
  #statusMessage[data-tone="success"]{ color:var(--success); }
  #statusMessage[data-tone="info"]{ color:var(--muted); }

  /* ---- Footer ---- */
  footer{
    margin-top:36px;
    text-align:center;
  }
  footer a{
    color:var(--muted);
    font-size:0.85rem;
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition:color .2s var(--ease), border-color .2s var(--ease);
  }
  footer a:hover,
  footer a:focus-visible{
    color:var(--accent);
    border-bottom-color:var(--accent);
  }

  @media (max-width:760px){
    .controls-grid{ grid-template-columns:repeat(2, 1fr); }
  }

  @media (max-width:600px){
    header.hero{ padding:40px 12px 20px; }
    .panel{ padding:18px; border-radius:var(--radius-md); }
    .upload-area{ padding:32px 16px; }
    .controls-grid{ grid-template-columns:1fr; gap:20px; }
    .controls-actions{ justify-content:stretch; }
    .controls-actions button{ flex:1; }
    .actions{ justify-content:stretch; }
    .actions button{ flex:1; }
  }
</style>
</head>
<body>

  <header class="hero fade-in">
    <h1 class="title">Cutout Effect Studio</h1>
    <p class="subtitle">Upload a photo, posterize it into bold flat tones, and export a polished cutout-style image — all in real time.</p>
  </header>

  <main class="app">

    <section class="panel fade-in d1" aria-labelledby="uploadHeading">
      <h2 id="uploadHeading" style="position:absolute;left:-9999px;">Upload an image</h2>

      <label
        class="upload-area"
        id="uploadArea"
        for="fileInput"
        role="button"
        tabindex="0"
        aria-describedby="uploadHint"
      >
        <span class="icon" aria-hidden="true">🖼️</span>
        <span class="primary-text" id="uploadText">Click, drag &amp; drop, or press Enter to upload an image</span>
        <span class="hint" id="uploadHint">PNG, JPG, JPEG, WEBP, HEIC or HEIF · up to 20MB</span>
        <input
          type="file"
          id="fileInput"
          accept="image/png, image/jpeg, image/webp, image/heic, image/heif, .heic, .heif"
          aria-label="Upload an image file (PNG, JPG, JPEG, WEBP, HEIC, or HEIF, max 20MB)"
        >
      </label>

      <p id="statusMessage" role="status" aria-live="polite"></p>
    </section>

    <section class="panel fade-in d2" aria-labelledby="controlsHeading">
      <h2 id="controlsHeading" style="position:absolute;left:-9999px;">Effect controls</h2>
      <div class="controls-grid">
        <div class="slider-group">
          <label for="levels">
            Number of Levels
            <span class="value" id="levelsValue">6</span>
          </label>
          <input
            type="range"
            id="levels"
            min="2"
            max="20"
            value="6"
            step="1"
            aria-valuemin="2"
            aria-valuemax="20"
            aria-valuenow="6"
            aria-label="Number of posterization levels, from 2 to 20"
          >
        </div>
        <div class="slider-group">
          <label for="simplicity">
            Edge Simplicity
            <span class="value" id="simplicityValue">4</span>
          </label>
          <input
            type="range"
            id="simplicity"
            min="0"
            max="10"
            value="4"
            step="1"
            aria-valuemin="0"
            aria-valuemax="10"
            aria-valuenow="4"
            aria-label="Edge simplicity, from 0 (no smoothing) to 10 (maximum smoothing)"
          >
        </div>
        <div class="slider-group">
          <label for="fidelity">
            Edge Fidelity
            <span class="value" id="fidelityValue">2</span>
          </label>
          <input
            type="range"
            id="fidelity"
            min="1"
            max="3"
            value="2"
            step="1"
            aria-valuemin="1"
            aria-valuemax="3"
            aria-valuenow="2"
            aria-label="Edge fidelity, from 1 (loose/rounded edges) to 3 (tight/true-to-original edges)"
          >
        </div>
      </div>
      <div class="controls-actions">
        <button id="resetSlidersBtn" class="secondary" disabled aria-label="Reset all sliders to their default values">
          Reset All Settings
        </button>
        <button id="resetBtn" class="secondary" disabled aria-label="Reset image to original, closest to unedited">
          Reset to Original
        </button>
      </div>
    </section>

    <section class="panel fade-in d3" aria-labelledby="previewHeading">
      <h2 id="previewHeading" style="position:absolute;left:-9999px;">Image preview</h2>
      <div class="canvas-wrap" id="canvasWrap">
        <span class="placeholder" id="placeholderText">No image loaded yet</span>
      </div>
      <div class="actions">
        <button id="downloadBtn" class="primary" disabled aria-label="Download the processed image as a PNG file">
          Download PNG
        </button>
      </div>
    </section>

  </main>

  <footer>
    <a href="https://linktr.ee/aligokdam" target="_blank" rel="noopener noreferrer">By Ali Gökdam</a>
  </footer>

<script>
"use strict";

// frame-ancestors 'none' in the CSP meta tag above only takes effect as a
// real HTTP response header, not via <meta>. If serving this file from a
// server, also send: Content-Security-Policy: frame-ancestors 'none'
// and X-Frame-Options: DENY as actual HTTP headers.

/* ==================================================================
   CutoutEffectApp
   ------------------------------------------------------------------
   Encapsulates all state and behavior for the app: file validation,
   image loading (via memory-safe Object URLs), the posterization
   ("cutout") algorithm, UI event wiring, and cleanup.
   ================================================================== */
class CutoutEffectApp {

  // File validation constants
  static ALLOWED_MIME_TYPES = ["image/png", "image/jpeg", "image/webp", "image/heic", "image/heif"];
  static ALLOWED_EXTENSIONS = [".png", ".jpg", ".jpeg", ".webp", ".heic", ".heif"];
  static HEIC_EXTENSIONS = [".heic", ".heif"];
  static MAX_FILE_SIZE_BYTES = 20 * 1024 * 1024; // 20MB
  static MAX_CANVAS_DIMENSION = 1600; // caps memory/CPU use on huge photos

  constructor(root) {
    // Cache DOM references once.
    this.dom = {
      fileInput: root.getElementById("fileInput"),
      uploadArea: root.getElementById("uploadArea"),
      uploadText: root.getElementById("uploadText"),
      levelsSlider: root.getElementById("levels"),
      levelsValue: root.getElementById("levelsValue"),
      simplicitySlider: root.getElementById("simplicity"),
      simplicityValue: root.getElementById("simplicityValue"),
      fidelitySlider: root.getElementById("fidelity"),
      fidelityValue: root.getElementById("fidelityValue"),
      resetBtn: root.getElementById("resetBtn"),
      resetSlidersBtn: root.getElementById("resetSlidersBtn"),
      downloadBtn: root.getElementById("downloadBtn"),
      canvasWrap: root.getElementById("canvasWrap"),
      statusMessage: root.getElementById("statusMessage"),
    };

    // Mutable state
    this.canvas = null;
    this.ctx = null;
    this.originalImageData = null; // pristine pixel data, re-used on every slider move
    this.currentObjectURL = null;  // tracked so we can revoke it and avoid memory leaks
    this._pendingRender = false;   // coalesces rapid slider drags into one render per frame

    this._bindEvents();
  }

  /* ---------------- Status / error messaging ---------------- */

  setStatus(message, tone = "info") {
    const el = this.dom.statusMessage;
    el.textContent = message;
    if (message) {
      el.setAttribute("data-tone", tone);
    } else {
      el.removeAttribute("data-tone");
    }
  }

  /* ---------------- File validation ---------------- */

  validateFile(file) {
    if (!file) {
      return { valid: false, reason: "No file was selected." };
    }

    const nameLower = file.name.toLowerCase();
    const hasAllowedExtension = CutoutEffectApp.ALLOWED_EXTENSIONS.some(
      (ext) => nameLower.endsWith(ext)
    );
    const isHeicExtension = CutoutEffectApp.HEIC_EXTENSIONS.some((ext) => nameLower.endsWith(ext));

    // Many browsers/OSes report an empty file.type for HEIC/HEIF files
    // (support for the format is inconsistent), so for that extension
    // only we also accept an empty MIME type rather than rejecting it.
    const hasAllowedMime =
      CutoutEffectApp.ALLOWED_MIME_TYPES.includes(file.type) ||
      (isHeicExtension && file.type === "");

    if (!hasAllowedMime || !hasAllowedExtension) {
      return {
        valid: false,
        reason: "Unsupported file type. Please upload a PNG, JPG, JPEG, WEBP, HEIC, or HEIF image.",
      };
    }

    if (file.size > CutoutEffectApp.MAX_FILE_SIZE_BYTES) {
      return {
        valid: false,
        reason: "File is too large. Maximum allowed size is 20MB.",
      };
    }

    if (file.size === 0) {
      return { valid: false, reason: "The selected file appears to be empty." };
    }

    return { valid: true };
  }

  /* ---------------- Safe DOM helpers ---------------- */

  // Avoids innerHTML entirely; removes children via the DOM API.
  _clearElement(el) {
    while (el.firstChild) {
      el.removeChild(el.firstChild);
    }
  }

  _createCanvas(width, height) {
    this._clearElement(this.dom.canvasWrap);

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    canvas.setAttribute("role", "img");
    canvas.setAttribute("aria-label", "Processed cutout-effect preview of the uploaded image");

    this.dom.canvasWrap.appendChild(canvas);

    const ctx = canvas.getContext("2d");
    if (!ctx) {
      throw new Error("This browser could not create a 2D canvas context.");
    }

    this.canvas = canvas;
    this.ctx = ctx;
  }

  /* ---------------- Memory cleanup ---------------- */

  _revokeCurrentObjectURL() {
    if (this.currentObjectURL) {
      URL.revokeObjectURL(this.currentObjectURL);
      this.currentObjectURL = null;
    }
  }

  /* ---------------- Image loading ---------------- */

  loadImageFile(file) {
    const validation = this.validateFile(file);
    if (!validation.valid) {
      this.setStatus(validation.reason, "error");
      return;
    }

    // Some photos (especially from iPhones/Macs) are actually HEIC/HEIF
    // under the hood — sometimes even named ".jpg"/".jpeg". Most browsers
    // (other than Safari) can't decode HEIC via <img>, so rather than
    // depending on a network-fetched decoder (unreliable in sandboxed/
    // restricted environments), we detect it locally by file signature
    // and guide the user to convert it themselves — fast, and it never
    // depends on the network.
    this._detectHeicHeif(file)
      .then((isHeicLike) => {
        if (isHeicLike) {
          this.setStatus(
            "This looks like a HEIC/HEIF photo (common on iPhone/Mac), even if its name ends in .jpg. Please convert it to JPEG or PNG first — on Mac: open it in Preview → File → Export, choose JPEG/PNG — then re-upload.",
            "error"
          );
          return;
        }
        this._loadValidatedImageFile(file);
      })
      .catch((err) => {
        console.error("Cutout Effect Studio — file inspection error:", err);
        // If sniffing itself fails for any reason, still attempt the
        // normal load path rather than blocking the user entirely.
        this._loadValidatedImageFile(file);
      });
  }

  // Reads just the first bytes of the file and checks for the ISOBMFF
  // "ftyp" box with a HEIC/HEIF brand (heic, heix, hevc, heim, heis,
  // hevm, hevs, mif1, msf1). This is a lightweight sniff, not a full
  // parser, but it's enough to catch mislabeled files (e.g. a HEIC photo
  // saved with a ".jpg" extension).
  _detectHeicHeif(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      const HEADER_BYTES = 32;

      reader.onload = () => {
        try {
          const bytes = new Uint8Array(reader.result);
          // ISOBMFF box layout: [4 bytes size][4 bytes "ftyp"][4 bytes brand]
          const boxType = Array.from(bytes.slice(4, 8))
            .map((b) => String.fromCharCode(b))
            .join("");
          if (boxType !== "ftyp") {
            resolve(false);
            return;
          }
          const brand = Array.from(bytes.slice(8, 12))
            .map((b) => String.fromCharCode(b))
            .join("")
            .toLowerCase();
          const heicBrands = ["heic", "heix", "hevc", "heim", "heis", "hevm", "hevs", "mif1", "msf1"];
          resolve(heicBrands.includes(brand));
        } catch (err) {
          resolve(false);
        }
      };
      reader.onerror = () => reject(reader.error);
      reader.readAsArrayBuffer(file.slice(0, HEADER_BYTES));
    });
  }

  async _loadValidatedImageFile(file) {
    // Revoke any previous object URL before creating a new one.
    this._revokeCurrentObjectURL();

    let img;

    // Preferred path: Object URLs are memory-efficient (no base64 blow-up).
    try {
      const objectUrl = URL.createObjectURL(file);
      this.currentObjectURL = objectUrl;
      img = await this._loadImageElement(objectUrl);
    } catch (err) {
      // Object URLs can fail to load into <img> in some restricted
      // browsing contexts. Data URLs are more universally compatible,
      // at the cost of extra memory, so retry with one before giving up.
      this._revokeCurrentObjectURL();
      try {
        const dataUrl = await this._readFileAsDataURL(file);
        img = await this._loadImageElement(dataUrl);
      } catch (fallbackErr) {
        console.error("Cutout Effect Studio — image load error:", fallbackErr);
        this.setStatus("This file could not be read as a valid image.", "error");
        return;
      }
    }

    try {
      this._handleImageLoaded(img);
      this.setStatus("Image loaded. Adjust the slider to preview the cutout effect.", "success");
    } catch (err) {
      console.error("Cutout Effect Studio — image processing error:", err);
      this.setStatus("Something went wrong while processing that image.", "error");
    } finally {
      // The bitmap is already drawn to canvas; the object URL (if any) is
      // no longer needed, so release it immediately to free memory.
      this._revokeCurrentObjectURL();
    }
  }

  // Loads a src (object URL or data URL) into a fresh <img> element and
  // resolves once it has fully decoded, or rejects on failure.
  _loadImageElement(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("Image element failed to load the given source."));
      img.src = src;
    });
  }

  // Reads a File/Blob as a base64 data: URL — universally compatible,
  // used only as a fallback when object URLs don't work in the current
  // browsing context.
  _readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  _handleImageLoaded(img) {
    const MAX_DIM = CutoutEffectApp.MAX_CANVAS_DIMENSION;
    let width = img.naturalWidth;
    let height = img.naturalHeight;

    if (!width || !height) {
      throw new Error("Image has invalid dimensions.");
    }

    if (width > MAX_DIM || height > MAX_DIM) {
      const scale = MAX_DIM / Math.max(width, height);
      width = Math.round(width * scale);
      height = Math.round(height * scale);
    }

    this._createCanvas(width, height);
    this.ctx.drawImage(img, 0, 0, width, height);

    // Snapshot the untouched pixels so every future slider change can
    // re-posterize from the true source instead of compounding effects.
    this.originalImageData = this.ctx.getImageData(0, 0, width, height);

    this.dom.uploadText.textContent = "Click, drag & drop, or press Enter to replace this image";
    this.dom.resetBtn.disabled = false;
    this.dom.resetSlidersBtn.disabled = false;
    this.dom.downloadBtn.disabled = false;

    this._renderEffect();
  }

  /* ---------------- Posterization ("Cutout") algorithm ----------------

     The effect has three parameters, combined in this order:

     1. EDGE SIMPLICITY — a box blur applied to the original pixels first.
        A larger `simplicity` value means a larger blur radius, which
        merges small details into their surroundings before quantization,
        producing bigger, simpler flat regions.

     2. EDGE FIDELITY — controls how much of the blurred result is
        actually used versus the sharp original, per pixel:
          mixed = originalWeight * original + blurWeight * blurred
        Higher fidelity increases `originalWeight`, pulling edges back
        toward their true, unblurred position (tighter/truer edges).
        Lower fidelity leans on the blurred version (looser, rounder
        edges).

     3. NUMBER OF LEVELS — posterization. The 0–255 range of each color
        channel is divided into `levels` equally spaced OUTPUT values,
        spaced by stepSize = 255 / (levels - 1). Each input value is
        rounded to its nearest bucket and mapped back to that bucket's
        output value:
          bucketIndex = Math.round(v / stepSize)
          output = bucketIndex * stepSize
        Applying this per-channel collapses many nearby shades into
        identical flat colors, producing the bold, poster-like look.
        Alpha is left untouched throughout.
  --------------------------------------------------------------------- */

  posterizeChannel(value, stepSize, levels) {
    if (levels <= 1) return value; // safety fallback, should not normally occur
    let bucketIndex = Math.round(value / stepSize);
    bucketIndex = Math.min(levels - 1, Math.max(0, bucketIndex));
    return Math.round(bucketIndex * stepSize);
  }

  applyCutoutEffect(levels, simplicity = 0, fidelity = 3) {
    if (!this.originalImageData || !this.ctx) return;

    const { width, height, data: src } = this.originalImageData;
    const radius = Math.round(simplicity);
    const blurred = radius > 0 ? this._boxBlur(src, width, height, radius) : src;

    // Map fidelity (1..3) to how strongly the sharp original pulls
    // through the blur: fidelity 3 => original only (tight edges),
    // fidelity 1 => blurred only (loose, rounded edges).
    const minFidelity = 1;
    const maxFidelity = 3;
    const originalWeight = (fidelity - minFidelity) / (maxFidelity - minFidelity);
    const blurWeight = 1 - originalWeight;

    const imgData = this.ctx.createImageData(width, height);
    const dst = imgData.data;
    const stepSize = 255 / (levels - 1);

    for (let i = 0; i < src.length; i += 4) {
      const r = src[i] * originalWeight + blurred[i] * blurWeight;
      const g = src[i + 1] * originalWeight + blurred[i + 1] * blurWeight;
      const b = src[i + 2] * originalWeight + blurred[i + 2] * blurWeight;

      dst[i]     = this.posterizeChannel(r, stepSize, levels); // Red
      dst[i + 1] = this.posterizeChannel(g, stepSize, levels); // Green
      dst[i + 2] = this.posterizeChannel(b, stepSize, levels); // Blue
      dst[i + 3] = src[i + 3];                                 // Alpha untouched
    }

    this.ctx.putImageData(imgData, 0, 0);
  }

  // Fast box blur via a two-pass (horizontal, then vertical) sliding-window
  // sum, so cost stays roughly O(width * height) regardless of radius.
  _boxBlur(src, width, height, radius) {
    const horizontal = this._boxBlurPass(src, width, height, radius, true);
    return this._boxBlurPass(horizontal, width, height, radius, false);
  }

  _boxBlurPass(src, width, height, radius, isHorizontal) {
    const out = new Uint8ClampedArray(src.length);
    const outerLen = isHorizontal ? height : width;
    const innerLen = isHorizontal ? width : height;

    // Reads the RGBA pixel at (outerIndex, innerIndex) regardless of pass direction.
    const pixelIndex = (outerIndex, innerIndex) => {
      const x = isHorizontal ? innerIndex : outerIndex;
      const y = isHorizontal ? outerIndex : innerIndex;
      return (y * width + x) * 4;
    };

    for (let outer = 0; outer < outerLen; outer++) {
      let sumR = 0, sumG = 0, sumB = 0, sumA = 0;

      // Prime the sliding window sum for the first pixel's neighborhood.
      for (let k = -radius; k <= radius; k++) {
        const clamped = Math.min(innerLen - 1, Math.max(0, k));
        const idx = pixelIndex(outer, clamped);
        sumR += src[idx]; sumG += src[idx + 1]; sumB += src[idx + 2]; sumA += src[idx + 3];
      }

      const windowSize = radius * 2 + 1;

      for (let inner = 0; inner < innerLen; inner++) {
        const idx = pixelIndex(outer, inner);
        out[idx]     = sumR / windowSize;
        out[idx + 1] = sumG / windowSize;
        out[idx + 2] = sumB / windowSize;
        out[idx + 3] = sumA / windowSize;

        // Slide the window: drop the pixel leaving, add the one entering.
        const leaving = Math.min(innerLen - 1, Math.max(0, inner - radius));
        const entering = Math.min(innerLen - 1, Math.max(0, inner + radius + 1));
        const leavingIdx = pixelIndex(outer, leaving);
        const enteringIdx = pixelIndex(outer, entering);

        sumR += src[enteringIdx]     - src[leavingIdx];
        sumG += src[enteringIdx + 1] - src[leavingIdx + 1];
        sumB += src[enteringIdx + 2] - src[leavingIdx + 2];
        sumA += src[enteringIdx + 3] - src[leavingIdx + 3];
      }
    }

    return out;
  }

  // Reads the current slider values and (re)renders the effect. Calls are
  // coalesced to at most one per animation frame, so rapid slider drags
  // stay smooth instead of queuing up redundant full-image recomputes.
  _renderEffect() {
    if (this._pendingRender) return;
    this._pendingRender = true;

    requestAnimationFrame(() => {
      this._pendingRender = false;
      const levels = parseInt(this.dom.levelsSlider.value, 10);
      const simplicity = parseInt(this.dom.simplicitySlider.value, 10);
      const fidelity = parseInt(this.dom.fidelitySlider.value, 10);
      this.applyCutoutEffect(levels, simplicity, fidelity);
    });
  }

  /* ---------------- Actions ---------------- */

  // Default slider values, used by "Reset All Settings".
  static DEFAULT_LEVELS = 6;
  static DEFAULT_SIMPLICITY = 4;
  static DEFAULT_FIDELITY = 2;

  _setSliderValue(slider, valueLabel, value) {
    slider.value = value;
    slider.setAttribute("aria-valuenow", value);
    valueLabel.textContent = value;
  }

  resetToOriginal() {
    if (!this.originalImageData || !this.ctx) return;
    this.ctx.putImageData(this.originalImageData, 0, 0);

    // Sync all three sliders to the values that represent "no effect
    // applied": maximum levels (least posterization), zero simplicity
    // (no blur), and maximum fidelity (no blur blended in).
    const maxLevels = this.dom.levelsSlider.max;
    const maxFidelity = this.dom.fidelitySlider.max;
    this._setSliderValue(this.dom.levelsSlider, this.dom.levelsValue, maxLevels);
    this._setSliderValue(this.dom.simplicitySlider, this.dom.simplicityValue, 0);
    this._setSliderValue(this.dom.fidelitySlider, this.dom.fidelityValue, maxFidelity);

    this.setStatus("Image reset to its closest-to-original state.", "info");
  }

  resetAllSettings() {
    if (!this.originalImageData) return;

    this._setSliderValue(this.dom.levelsSlider, this.dom.levelsValue, CutoutEffectApp.DEFAULT_LEVELS);
    this._setSliderValue(this.dom.simplicitySlider, this.dom.simplicityValue, CutoutEffectApp.DEFAULT_SIMPLICITY);
    this._setSliderValue(this.dom.fidelitySlider, this.dom.fidelityValue, CutoutEffectApp.DEFAULT_FIDELITY);

    this._renderEffect();
    this.setStatus("All settings reset to their defaults.", "info");
  }

  downloadImage() {
    if (!this.canvas) return;

    let dataUrl;
    try {
      dataUrl = this.canvas.toDataURL("image/png");
    } catch (err) {
      console.error("Cutout Effect Studio — export error:", err);
      this.setStatus("Could not export the image. Please try again.", "error");
      return;
    }

    // Primary path: a normal anchor-click download. This works in regular
    // browser tabs but is silently blocked in some sandboxed embedded
    // contexts that don't grant download permissions.
    try {
      const link = document.createElement("a");
      link.download = "cutout-effect.png";
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    } catch (err) {
      console.error("Cutout Effect Studio — download link error:", err);
    }

    // Fallback path: open the image in a new tab so it can always be
    // saved via the browser's own "Save Image As" — this works even where
    // the anchor-click download above is blocked.
    const opened = window.open(dataUrl, "_blank", "noopener,noreferrer");
    if (opened) {
      this.setStatus("Download started — if nothing happened, use the image opened in the new tab and save it from there.", "success");
    } else {
      this.setStatus("Download started. If it didn't work, right-click the image above and choose \"Save Image As…\".", "success");
    }
  }

  /* ---------------- Event wiring ---------------- */

  _bindEvents() {
    const {
      fileInput, uploadArea,
      levelsSlider, levelsValue,
      simplicitySlider, simplicityValue,
      fidelitySlider, fidelityValue,
      resetBtn, resetSlidersBtn, downloadBtn,
    } = this.dom;

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) this.loadImageFile(file);
      // Reset the input value so selecting the same file again still fires "change".
      fileInput.value = "";
    });

    // Keyboard activation for the custom upload control (Enter / Space).
    uploadArea.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        fileInput.click();
      }
    });

    // Drag & drop support.
    ["dragover", "dragenter"].forEach((evt) => {
      uploadArea.addEventListener(evt, (e) => {
        e.preventDefault();
        uploadArea.classList.add("dragging");
      });
    });
    ["dragleave", "dragend", "drop"].forEach((evt) => {
      uploadArea.addEventListener(evt, () => {
        uploadArea.classList.remove("dragging");
      });
    });
    uploadArea.addEventListener("drop", (e) => {
      e.preventDefault();
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) this.loadImageFile(file);
    });

    levelsSlider.addEventListener("input", () => {
      levelsValue.textContent = levelsSlider.value;
      levelsSlider.setAttribute("aria-valuenow", levelsSlider.value);
      this._renderEffect();
    });

    simplicitySlider.addEventListener("input", () => {
      simplicityValue.textContent = simplicitySlider.value;
      simplicitySlider.setAttribute("aria-valuenow", simplicitySlider.value);
      this._renderEffect();
    });

    fidelitySlider.addEventListener("input", () => {
      fidelityValue.textContent = fidelitySlider.value;
      fidelitySlider.setAttribute("aria-valuenow", fidelitySlider.value);
      this._renderEffect();
    });

    resetBtn.addEventListener("click", () => this.resetToOriginal());
    resetSlidersBtn.addEventListener("click", () => this.resetAllSettings());
    downloadBtn.addEventListener("click", () => this.downloadImage());

    // Release object URLs if the user navigates away mid-load.
    window.addEventListener("beforeunload", () => this._revokeCurrentObjectURL());
  }
}

// Bootstrap once the DOM is ready.
document.addEventListener("DOMContentLoaded", () => {
  new CutoutEffectApp(document);
});
</script>
</body>
</html>
